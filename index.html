<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkFinder | Remote Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .job-card:hover { transform: translateY(-5px); transition: 0.3s; }
        .hero-section { background: #007bff; color: white; padding: 60px 0; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">WorkFinder</span>
        </div>
    </nav>

    <header class="hero-section text-center">
        <div class="container">
            <h1>Find Your Next Remote Job</h1>
            <p class="lead">Curated opportunities for students and professionals</p>
        </div>
    </header>

    <div class="container py-5">
        <div id="job-list" class="row">
            <div class="text-center">
                <p>Connecting to job database...</p>
            </div>
        </div>
    </div>

    <script>
        fetch('https://jobicy.com/api/v2/remote-jobs?count=12')
            .then(response => response.json())
            .then(data => {
                const jobList = document.getElementById('job-list');
                jobList.innerHTML = ''; 
                
                data.jobs.forEach(job => {
                    jobList.innerHTML += `
                        <div class="col-md-4 mb-4">
                            <div class="card h-100 shadow-sm job-card">
                                <div class="card-body">
                                    <span class="badge bg-info mb-2 text-dark">${job.jobCategory}</span>
                                    <h5 class="card-title text-primary">${job.jobTitle}</h5>
                                    <h6 class="card-subtitle mb-2 text-muted">${job.companyName}</h6>
                                    <p class="small text-secondary">Location: Remote</p>
                                    <a href="${job.url}" target="_blank" class="btn btn-outline-primary w-100">Apply Now</a>
                                </div>
                            </div>
                        </div>`;
                });
            })
            .catch(err => {
                document.getElementById('job-list').innerHTML = '<p class="text-center text-danger">Unable to load jobs. Please check your connection.</p>';
            });
    </script>
</body>
</html>
